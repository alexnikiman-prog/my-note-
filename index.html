<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Share My Text</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #0f172a; color: #f8fafc; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { width: 90%; max-width: 500px; background: #1e293b; padding: 30px; border-radius: 24px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); border: 1px solid #334155; }
        h2 { text-align: center; color: #38bdf8; margin-bottom: 20px; }
        textarea { width: 100%; height: 200px; background: #0f172a; border: 1px solid #334155; border-radius: 12px; color: #fff; padding: 15px; font-size: 16px; resize: none; box-sizing: border-box; transition: 0.3s; }
        textarea:focus { outline: none; border-color: #38bdf8; box-shadow: 0 0 10px rgba(56, 189, 248, 0.3); }
        button { width: 100%; margin-top: 20px; padding: 14px; border: none; border-radius: 12px; background: #38bdf8; color: #0f172a; font-weight: bold; font-size: 16px; cursor: pointer; transition: 0.3s; }
        button:hover { background: #7dd3fc; transform: translateY(-2px); }
        .link-box { margin-top: 20px; display: none; background: #334155; padding: 15px; border-radius: 10px; font-size: 13px; word-break: break-all; border: 1px dashed #38bdf8; color: #bae6fd; }
    </style>
</head>
<body>

<div class="card">
    <h2 id="title">Type Your Message</h2>
    <textarea id="textInput" placeholder="Enter your text here..."></textarea>
    <button id="btn" onclick="generateLink()">Generate Shareable Link</button>
    <div id="linkOutput" class="link-box"></div>
</div>

<script>
    // Check if there is a message in the URL
    window.onload = function() {
        const hash = window.location.hash.substring(1);
        if (hash) {
            try {
                const decodedText = decodeURIComponent(escape(atob(hash)));
                document.getElementById('textInput').value = decodedText;
                document.getElementById('title').innerText = "Received Message:";
                document.getElementById('btn').style.display = "none";
            } catch(e) { 
                console.error("Invalid link"); 
            }
        }
    }

    // Convert text to a shareable link
    function generateLink() {
        const text = document.getElementById('textInput').value;
        if (!text) return alert("Please write something first!");
        
        // Encode the text
        const base64Text = btoa(unescape(encodeURIComponent(text)));
        const shareableLink = window.location.origin + window.location.pathname + "#" + base64Text;
        
        const output = document.getElementById('linkOutput');
        output.style.display = 'block';
        output.innerText = "Copy this link: " + shareableLink;
        
        // Auto-copy to clipboard
        navigator.clipboard.writeText(shareableLink);
        alert("Link copied to clipboard!");
    }
</script>

</body>
</html>
