<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For Siver</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            font-family: 'Apple SD Gothic Neo', 'Segoe UI', Roboto, sans-serif;
            color: #ffffff;
        }
        .container {
            width: 85%;
            max-width: 400px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            padding: 40px 30px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px rgba(0,0,0,0.3);
            text-align: center;
        }
        h1 {
            font-weight: 300;
            letter-spacing: 2px;
            margin-bottom: 30px;
            color: #38bdf8;
            font-size: 24px;
        }
        textarea {
            width: 100%;
            height: 180px;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(56, 189, 248, 0.3);
            border-radius: 20px;
            color: #f1f5f9;
            padding: 15px;
            font-size: 16px;
            line-height: 1.6;
            resize: none;
            outline: none;
            box-sizing: border-box;
            margin-bottom: 20px;
        }
        button {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 50px;
            background: #38bdf8;
            color: #0f172a;
            font-weight: bold;
            font-size: 15px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 20px rgba(56, 189, 248, 0.2);
        }
        button:active {
            transform: scale(0.98);
        }
        .result-box {
            display: none;
            margin-top: 25px;
            padding: 15px;
            background: rgba(56, 189, 248, 0.1);
            border-radius: 15px;
            font-size: 12px;
            word-break: break-all;
            color: #bae6fd;
            border: 1px dashed #38bdf8;
        }
    </style>
</head>
<body>

<div class="container">
    <h1 id="title">MESSENGER</h1>
    <textarea id="textInput" placeholder="Write your heart out..."></textarea>
    <button id="mainBtn" onclick="process()">CREATE MAGIC LINK</button>
    <div id="linkOutput" class="result-box"></div>
</div>

<script>
    window.onload = function() {
        const hash = window.location.hash.substring(1);
        if (hash) {
            try {
                const decoded = decodeURIComponent(escape(atob(hash)));
                document.getElementById('textInput').value = decoded;
                document.getElementById('title').innerText = "FOR YOU";
                document.getElementById('mainBtn').style.display = "none";
                document.getElementById('textInput').readOnly = true;
            } catch(e) { }
        }
    }

    function process() {
        const txt = document.getElementById('textInput').value;
        if (!txt) return;
        const b64 = btoa(unescape(encodeURIComponent(txt)));
        const finalLink = window.location.origin + window.location.pathname + "#" + b64;
        const out = document.getElementById('linkOutput');
        out.style.display = 'block';
        out.innerText = finalLink;
        navigator.clipboard.writeText(finalLink);
        alert("Magic link copied! Send it to Siver.");
    }
</script>

</body>
</html>
